<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor2API 控制台</title>
    <style>
        :root {
            --bg: #f3efe7;
            --panel: rgba(255, 252, 246, 0.92);
            --panel-strong: #fffdf8;
            --text: #1f2a37;
            --muted: #5f6b7a;
            --line: rgba(31, 42, 55, 0.12);
            --brand: #155e75;
            --brand-soft: #e0f2fe;
            --accent: #b45309;
            --accent-soft: #fff1db;
            --success: #166534;
            --success-soft: #dcfce7;
            --danger: #b42318;
            --danger-soft: #fee4e2;
            --shadow: 0 24px 70px rgba(17, 24, 39, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "IBM Plex Sans", "PingFang SC", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(21, 94, 117, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(180, 83, 9, 0.14), transparent 24%),
                linear-gradient(180deg, #f8f3ea 0%, #efe7da 100%);
        }

        .shell {
            max-width: 1160px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .hero {
            background: linear-gradient(140deg, rgba(15, 23, 42, 0.92), rgba(21, 94, 117, 0.88));
            color: #f8fafc;
            border-radius: 28px;
            padding: 32px;
            box-shadow: var(--shadow);
        }

        .hero-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .hero h1 {
            margin-top: 16px;
            font-size: clamp(2rem, 4vw, 3.6rem);
            line-height: 1.02;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin-top: 14px;
            max-width: 720px;
            color: rgba(248, 250, 252, 0.82);
            font-size: 1.02rem;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 18px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }

        .status-label {
            color: rgba(248, 250, 252, 0.68);
            font-size: 0.82rem;
            margin-bottom: 8px;
        }

        .status-value {
            font-size: 1rem;
            font-weight: 600;
            word-break: break-word;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 22px;
            margin-top: 22px;
        }

        .stack {
            display: grid;
            gap: 22px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 14px 40px rgba(17, 24, 39, 0.06);
            backdrop-filter: blur(10px);
        }

        .panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .panel h2 {
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }

        .panel-note {
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.55;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--brand-soft);
            color: var(--brand);
            font-size: 0.82rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .form-grid {
            display: grid;
            gap: 14px;
            margin-top: 6px;
        }

        label {
            display: block;
            font-size: 0.92rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            border: 1px solid rgba(21, 94, 117, 0.22);
            background: var(--panel-strong);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 0.96rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(14, 116, 144, 0.12);
        }

        .row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .button {
            border: none;
            border-radius: 14px;
            padding: 13px 18px;
            background: var(--brand);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .button.secondary {
            background: #0f172a;
        }

        .message {
            display: none;
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 0.92rem;
        }

        .message.success {
            display: block;
            background: var(--success-soft);
            color: var(--success);
        }

        .message.error {
            display: block;
            background: var(--danger-soft);
            color: var(--danger);
        }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .model-card {
            border: 1px solid rgba(21, 94, 117, 0.16);
            background: var(--panel-strong);
            border-radius: 18px;
            padding: 18px;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .model-card:hover {
            transform: translateY(-3px);
            border-color: rgba(21, 94, 117, 0.45);
            box-shadow: 0 14px 30px rgba(21, 94, 117, 0.08);
        }

        .model-card.active {
            border-color: var(--brand);
            background: #eff9fc;
            box-shadow: inset 0 0 0 1px rgba(21, 94, 117, 0.18);
        }

        .model-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .model-meta {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .code-list {
            display: grid;
            gap: 16px;
        }

        .code-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #101826;
            overflow: hidden;
        }

        .code-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .code-head strong {
            color: #f8fafc;
            font-size: 0.96rem;
        }

        .code-head span {
            color: rgba(248, 250, 252, 0.62);
            font-size: 0.82rem;
        }

        .copy {
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.84rem;
        }

        pre {
            margin: 0;
            padding: 18px 16px 20px;
            overflow-x: auto;
        }

        code {
            font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
            font-size: 0.88rem;
            line-height: 1.65;
            color: #dbe7f3;
            white-space: pre;
        }

        .hint {
            margin-top: 14px;
            padding: 14px;
            border-radius: 16px;
            background: var(--accent-soft);
            color: #9a3412;
            font-size: 0.9rem;
            line-height: 1.55;
        }

        .empty {
            padding: 20px;
            border-radius: 18px;
            border: 1px dashed rgba(21, 94, 117, 0.28);
            color: var(--muted);
            text-align: center;
            background: rgba(255, 255, 255, 0.55);
        }

        .footer {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 920px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .hero {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="hero">
            <div class="hero-top">
                <div>
                    <div class="eyebrow">OpenAI 兼容 API</div>
                    <h1>Cursor2API</h1>
                    <p>模型、示例、API Key。</p>
                </div>
                <div class="pill" id="healthPill">检查中</div>
            </div>
            <div class="status-grid">
                <div class="status-card">
                    <div class="status-label">Base URL</div>
                    <div class="status-value" id="baseUrlValue"></div>
                </div>
                <div class="status-card">
                    <div class="status-label">状态</div>
                    <div class="status-value" id="healthValue">检查中</div>
                </div>
                <div class="status-card">
                    <div class="status-label">模型数</div>
                    <div class="status-value" id="modelCountValue">-</div>
                </div>
                <div class="status-card">
                    <div class="status-label">当前模型</div>
                    <div class="status-value" id="selectedModelValue">-</div>
                </div>
            </div>
        </section>

        <div class="layout">
            <div class="stack">
                <section class="panel">
                    <div class="panel-header">
                        <div>
                            <h2>模型</h2>
                        </div>
                        <div class="pill">选择</div>
                    </div>
                    <div class="models-grid" id="modelsGrid">
                        <div class="empty">加载中</div>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <div>
                            <h2>示例</h2>
                        </div>
                        <div class="pill">curl</div>
                    </div>
                    <div class="code-list">
                        <div class="code-card">
                            <div class="code-head">
                                <div>
                                    <strong>模型列表</strong>
                                    <span>GET /v1/models</span>
                                </div>
                                <button class="copy" data-copy-target="modelsCode">复制</button>
                            </div>
                            <pre><code id="modelsCode"></code></pre>
                        </div>

                        <div class="code-card">
                            <div class="code-head">
                                <div>
                                    <strong>聊天</strong>
                                    <span>POST /v1/chat/completions</span>
                                </div>
                                <button class="copy" data-copy-target="chatCode">复制</button>
                            </div>
                            <pre><code id="chatCode"></code></pre>
                        </div>

                        <div class="code-card">
                            <div class="code-head">
                                <div>
                                    <strong>修改 API Key</strong>
                                    <span>POST /v1/admin/api-key</span>
                                </div>
                                <button class="copy" data-copy-target="rotateCode">复制</button>
                            </div>
                            <pre><code id="rotateCode"></code></pre>
                        </div>
                    </div>
                </section>
            </div>

            <div class="stack">
                <section class="panel">
                    <div class="panel-header">
                        <div>
                            <h2>API Key</h2>
                        </div>
                        <div class="pill">保存</div>
                    </div>

                    <div class="form-grid">
                        <div>
                            <label for="currentApiKey">当前 API Key</label>
                            <input id="currentApiKey" type="password" autocomplete="current-password" placeholder="当前 API Key">
                        </div>
                        <div>
                            <label for="newApiKey">新 API Key</label>
                            <input id="newApiKey" type="password" autocomplete="new-password" placeholder="新 API Key">
                        </div>
                        <div class="row">
                            <button class="button" id="saveApiKeyButton">保存</button>
                            <button class="button secondary" id="toggleVisibilityButton" type="button">显示 / 隐藏</button>
                        </div>
                    </div>

                    <div class="message" id="formMessage"></div>
                </section>
            </div>
        </div>

        <p class="footer">Cursor2API</p>
    </div>

    <script>
        (function () {
            const state = {
                baseUrl: window.location.origin,
                models: [],
                selectedModel: "",
                apiKey: localStorage.getItem("cursor2api.apiKey") || ""
            };

            const healthPill = document.getElementById("healthPill");
            const healthValue = document.getElementById("healthValue");
            const modelCountValue = document.getElementById("modelCountValue");
            const selectedModelValue = document.getElementById("selectedModelValue");
            const modelsGrid = document.getElementById("modelsGrid");
            const currentApiKeyInput = document.getElementById("currentApiKey");
            const newApiKeyInput = document.getElementById("newApiKey");
            const formMessage = document.getElementById("formMessage");
            const saveApiKeyButton = document.getElementById("saveApiKeyButton");
            const toggleVisibilityButton = document.getElementById("toggleVisibilityButton");

            document.getElementById("baseUrlValue").textContent = state.baseUrl;
            currentApiKeyInput.value = state.apiKey;

            function providerName(modelId) {
                if (modelId.startsWith("google/")) return "Google";
                if (modelId.startsWith("openai/") || modelId.startsWith("gpt-")) return "OpenAI";
                if (modelId.startsWith("anthropic/") || modelId.startsWith("claude")) return "Anthropic";
                return "cursor2api";
            }

            function currentKeyForDocs() {
                return currentApiKeyInput.value.trim() || state.apiKey || "YOUR_KEY";
            }

            function newKeyForDocs() {
                return newApiKeyInput.value.trim() || "NEW_KEY";
            }

            function setMessage(type, text) {
                formMessage.className = "message " + type;
                formMessage.textContent = text;
            }

            function clearMessage() {
                formMessage.className = "message";
                formMessage.textContent = "";
            }

            function updateCode(targetId, content) {
                document.getElementById(targetId).textContent = content;
            }

            function renderExamples() {
                const model = state.selectedModel || "google/gemini-3-flash";
                const authKey = currentKeyForDocs();
                const nextKey = newKeyForDocs();

                updateCode("modelsCode",
`curl ${state.baseUrl}/v1/models`);

                updateCode("chatCode",
`curl -X POST ${state.baseUrl}/v1/chat/completions \\
  -H "Content-Type: application/json" \\
  -H "Authorization: Bearer ${authKey}" \\
  -d '{
    "model": "${model}",
    "messages": [
      {"role": "user", "content": "reply with exactly OK"}
    ],
    "stream": false
  }'`);

                updateCode("rotateCode",
`curl -X POST ${state.baseUrl}/v1/admin/api-key \\
  -H "Content-Type: application/json" \\
  -H "Authorization: Bearer ${authKey}" \\
  -d '{
    "api_key": "${nextKey}"
  }'`);
            }

            function renderModels() {
                if (!state.models.length) {
                    modelsGrid.innerHTML = '<div class="empty">暂无模型</div>';
                    selectedModelValue.textContent = "-";
                    modelCountValue.textContent = "0";
                    renderExamples();
                    return;
                }

                modelCountValue.textContent = String(state.models.length);
                if (!state.selectedModel) {
                    state.selectedModel = state.models[0].id;
                }
                selectedModelValue.textContent = state.selectedModel;

                modelsGrid.innerHTML = "";
                state.models.forEach(function (model) {
                    const card = document.createElement("button");
                    card.type = "button";
                    card.className = "model-card" + (model.id === state.selectedModel ? " active" : "");
                    card.innerHTML =
                        '<div class="model-title">' + model.id + '</div>' +
                        '<div class="model-meta">' + providerName(model.id) + ' · ' + (model.id.endsWith("-thinking") ? "Thinking" : "Base") + '</div>';
                    card.addEventListener("click", function () {
                        state.selectedModel = model.id;
                        renderModels();
                        renderExamples();
                    });
                    modelsGrid.appendChild(card);
                });
            }

            function loadHealth() {
                fetch("/health")
                    .then(function (response) {
                        if (!response.ok) throw new Error("health request failed");
                        return response.json();
                    })
                    .then(function () {
                        healthPill.textContent = "正常";
                        healthPill.style.background = "var(--success-soft)";
                        healthPill.style.color = "var(--success)";
                        healthValue.textContent = "正常";
                    })
                    .catch(function () {
                        healthPill.textContent = "离线";
                        healthPill.style.background = "var(--danger-soft)";
                        healthPill.style.color = "var(--danger)";
                        healthValue.textContent = "离线";
                    });
            }

            function loadModels() {
                fetch("/v1/models")
                    .then(function (response) {
                        if (!response.ok) throw new Error("models request failed");
                        return response.json();
                    })
                    .then(function (payload) {
                        state.models = Array.isArray(payload.data) ? payload.data : [];
                        renderModels();
                        renderExamples();
                    })
                    .catch(function () {
                        state.models = [];
                        renderModels();
                    });
            }

            function saveApiKey() {
                clearMessage();
                const currentKey = currentApiKeyInput.value.trim();
                const newKey = newApiKeyInput.value.trim();

                if (!currentKey) {
                    setMessage("error", "请输入当前 API Key");
                    return;
                }
                if (!newKey) {
                    setMessage("error", "请输入新 API Key");
                    return;
                }

                saveApiKeyButton.disabled = true;
                fetch("/v1/admin/api-key", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + currentKey
                    },
                    body: JSON.stringify({ api_key: newKey })
                })
                    .then(async function (response) {
                        const payload = await response.json().catch(function () { return {}; });
                        if (!response.ok) {
                            const message = payload && payload.error && payload.error.message ? payload.error.message : "保存失败";
                            throw new Error(message);
                        }
                        return payload;
                    })
                    .then(function () {
                        state.apiKey = newKey;
                        localStorage.setItem("cursor2api.apiKey", newKey);
                        currentApiKeyInput.value = newKey;
                        newApiKeyInput.value = "";
                        setMessage("success", "已保存");
                        renderExamples();
                    })
                    .catch(function (error) {
                        setMessage("error", error.message || "保存失败");
                    })
                    .finally(function () {
                        saveApiKeyButton.disabled = false;
                    });
            }

            saveApiKeyButton.addEventListener("click", saveApiKey);
            toggleVisibilityButton.addEventListener("click", function () {
                const nextType = currentApiKeyInput.type === "password" ? "text" : "password";
                currentApiKeyInput.type = nextType;
                newApiKeyInput.type = nextType;
            });

            currentApiKeyInput.addEventListener("input", renderExamples);
            newApiKeyInput.addEventListener("input", renderExamples);

            document.querySelectorAll("[data-copy-target]").forEach(function (button) {
                button.addEventListener("click", function () {
                    const target = document.getElementById(button.getAttribute("data-copy-target"));
                    navigator.clipboard.writeText(target.textContent).then(function () {
                        const previous = button.textContent;
                        button.textContent = "已复制";
                        setTimeout(function () {
                            button.textContent = previous;
                        }, 1200);
                    });
                });
            });

            renderExamples();
            loadHealth();
            loadModels();
        })();
    </script>
</body>
</html>
